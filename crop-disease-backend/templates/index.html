<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crop Disease & Treatment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#0b1b12;
      --card:#0f2418;
      --muted:#9fb5a8;
      --text:#e6f2ea;
      --accent:#2ecc71;
      --accent-2:#23b15f;
      --danger:#ff6b6b;
      --border:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1000px 500px at -10% -10%, #193224 10%, transparent 60%),
        radial-gradient(800px 600px at 110% 10%, #173122 10%, transparent 60%),
        radial-gradient(900px 700px at 50% 120%, #143020 20%, transparent 70%),
        var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .shell{
      width:100%;
      max-width:880px;
      display:grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap:20px;
    }
    @media (max-width: 860px){
      .shell{grid-template-columns:1fr}
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }
    .header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
    }
    .logo{
      width:40px;height:40px;border-radius:10px;
      background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-2));
      box-shadow: 0 8px 20px rgba(46,204,113,0.35);
    }
    h1{
      font-size:20px;margin:0;
      letter-spacing:0.3px;
    }
    .subtitle{
      margin:2px 0 14px;
      color:var(--muted);
      font-size:13px;
    }
    .row{
      display:flex;gap:10px;align-items:center;margin-bottom:12px;
    }
    select, .select{
      appearance:none;
      background:#13281b;border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;border-radius:10px;font-size:14px;
      outline:none;min-width:220px;
    }
    .drop{
      margin-top:8px;
      border:1.2px dashed rgba(255,255,255,0.15);
      background: #0f2318;
      border-radius:14px;
      padding:18px;
      text-align:center;
      transition:.2s ease;
    }
    .drop.highlight{border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,204,113,0.15) inset}
    .drop .hint{font-size:13px;color:var(--muted)}
    .drop button{
      margin-top:10px;
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
      color:#082313;border:0;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;
      box-shadow: 0 8px 20px rgba(46,204,113,0.35);
    }
    input[type=file]{display:none}
    .preview{
      margin-top:12px;border-radius:12px;overflow:hidden;border:1px solid var(--border);
    }
    .preview img{width:100%;max-height:320px;object-fit:contain;background:#0d2015;display:block}
    .actions{display:flex;gap:10px;margin-top:12px}
    .btn{
      flex:1;
      padding:12px;border-radius:999px;border:1px solid var(--border);
      background:#13281b;color:var(--text);font-weight:700;cursor:pointer;
    }
    .btn.primary{
      border:none;
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
      color:#082313;box-shadow: 0 10px 24px rgba(46,204,113,0.35);
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .status{margin-top:8px;color:var(--muted);font-size:13px}
    .progress{
      margin-top:10px;height:8px;border-radius:999px;background:#0c1e14;border:1px solid var(--border);overflow:hidden;
    }
    .bar{height:100%;width:0;background: linear-gradient(90deg,var(--accent),var(--accent-2)); transition: width .25s ease}
    .chip{
      display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;
      background:linear-gradient(180deg, rgba(46,204,113,0.18), rgba(46,204,113,0.08));
      border:1px solid rgba(46,204,113,0.35);
      color:#b7ffd2;margin-bottom:8px
    }
    .grid{
      display:grid;gap:10px;grid-template-columns:1fr; margin-top:10px
    }
    .lang{
      border:1px solid var(--border);border-radius:12px;padding:12px;background:#112518;
    }
    .lang h3{margin:0 0 6px;font-size:13px;color:var(--muted)}
    .lang .text{font-size:14px;line-height:1.45;white-space:pre-wrap}
    .error{color:var(--danger);margin-top:8px;font-size:13px}
    footer{margin-top:10px;color:var(--muted);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <div class="header">
        <div class="logo"></div>
        <div>
          <h1>Crop Disease & Treatment</h1>
          <div class="subtitle">Upload a leaf image; get disease and medicine steps in English, Hindi, Telugu.</div>
        </div>
      </div>

      <div class="row">
        <label class="select">
          <span style="opacity:.7;margin-right:8px">Crop</span>
          <select id="cropSelect" style="background:transparent;border:0;color:inherit;outline:none">
            <option value="veg">Tomato / Potato / Pepper</option>
            <option value="rice">Rice</option>
          </select>
        </label>
      </div>

      <label class="drop" id="dropzone">
        <div class="hint">Drag & drop leaf photo here, or</div>
        <button type="button" id="chooseBtn">Choose Image</button>
        <input type="file" id="fileInput" accept="image/*">
      </label>

      <div class="preview" id="previewWrap" style="display:none">
        <img id="preview" alt="Preview">
      </div>

      <div class="actions">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn primary" id="uploadBtn">Get Disease & Treatment</button>
      </div>

      <div class="status" id="status"></div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="error" id="error" style="display:none"></div>
    </section>

    <section class="card" id="result" style="display:none">
      <div class="chip" id="diseaseTag"></div>
      <div class="grid">
        <div class="lang">
          <h3>English</h3>
          <div class="text" id="en"></div>
        </div>
        <div class="lang">
          <h3>हिन्दी / Hindi</h3>
          <div class="text" id="hi"></div>
        </div>
        <div class="lang">
          <h3>తెలుగు / Telugu</h3>
          <div class="text" id="te"></div>
        </div>
      </div>
      <footer>Model predictions may take a few seconds on first run.</footer>
    </section>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const chooseBtn = document.getElementById('chooseBtn');
    const preview = document.getElementById('preview');
    const previewWrap = document.getElementById('previewWrap');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const cropSelect = document.getElementById('cropSelect');
    const dropzone = document.getElementById('dropzone');
    const bar = document.getElementById('bar');
    const err = document.getElementById('error');

    const diseaseTag = document.getElementById('diseaseTag');
    const enSpan = document.getElementById('en');
    const hiSpan = document.getElementById('hi');
    const teSpan = document.getElementById('te');

    const setBar = (p)=> bar.style.width = Math.max(0, Math.min(100, p)) + '%';
    const resetUI = ()=>{
      statusDiv.textContent = '';
      err.style.display = 'none';
      err.textContent = '';
      resultDiv.style.display = 'none';
      setBar(0);
    };
    const showPreview = (file)=>{
      preview.src = URL.createObjectURL(file);
      previewWrap.style.display = 'block';
      resultDiv.style.display = 'none';
      statusDiv.textContent = '';
      setBar(25);
    };

    chooseBtn.addEventListener('click', ()=> fileInput.click());

    ['dragenter','dragover'].forEach(ev=>{
      dropzone.addEventListener(ev, e=>{e.preventDefault();e.stopPropagation(); dropzone.classList.add('highlight')});
    });
    ['dragleave','drop'].forEach(ev=>{
      dropzone.addEventListener(ev, e=>{e.preventDefault();e.stopPropagation(); dropzone.classList.remove('highlight')});
    });
    dropzone.addEventListener('drop', e=>{
      const file = e.dataTransfer.files?.[0];
      if (file) { fileInput.files = e.dataTransfer.files; showPreview(file); }
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) showPreview(file);
    });

    clearBtn.addEventListener('click', ()=>{
      fileInput.value = '';
      previewWrap.style.display = 'none';
      resetUI();
    });

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        err.style.display = 'block';
        err.textContent = 'Please choose an image first.';
        return;
      }
      err.style.display = 'none';

      uploadBtn.disabled = true;
      clearBtn.disabled = true;
      uploadBtn.textContent = 'Processing...';
      statusDiv.textContent = 'Uploading and predicting...';
      setBar(55);
      resultDiv.style.display = 'none';

      const formData = new FormData();
      formData.append('file', file);

      const crop = cropSelect.value;
      const endpoint = crop === 'rice' ? '/predict_rice' : '/predict';

      let prog = 55;
      const timer = setInterval(()=>{ prog = Math.min(95, prog + 3); setBar(prog); }, 250);

      try {
        const res = await fetch(endpoint, { method: 'POST', body: formData });
        const text = await res.text();
        if (!res.ok) {
          err.style.display = 'block';
          err.textContent = 'Server error: ' + res.status;
          return;
        }
        const data = JSON.parse(text);
        statusDiv.textContent = 'Done.';
        diseaseTag.textContent = data.disease || 'Unknown disease';
        enSpan.textContent = data.solution_en || '';
        hiSpan.textContent = data.solution_hi || '';
        teSpan.textContent = data.solution_te || '';
        resultDiv.style.display = 'block';
        setBar(100);
      } catch (e) {
        err.style.display = 'block';
        err.textContent = 'Network or server error.';
      } finally {
        clearInterval(timer);
        uploadBtn.disabled = false;
        clearBtn.disabled = false;
        uploadBtn.textContent = 'Get Disease & Treatment';
      }
    });
  </script>
</body>
</html>
